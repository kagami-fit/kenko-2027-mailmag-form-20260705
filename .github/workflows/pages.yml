name: Publish static site to gh-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site/assets
          cp index.html styles.css app.js 404.html .nojekyll _site/
          cp assets/favicon.png _site/assets/
          cp assets/mailmag-image-201.png _site/assets/
          cp assets/mailmag-image-204.jpg _site/assets/
          cp assets/mailmag-image-225.png _site/assets/
          cp assets/seminar-icon-requirements-imagegen2.png _site/assets/
          cp assets/seminar-icon-application-imagegen2.png _site/assets/
          cp assets/seminar-icon-improvement-imagegen2.png _site/assets/
          cp assets/mediphone-body-palette-hero.png _site/assets/
          cp assets/mediphone-body-palette-diagram.png _site/assets/

          mkdir -p _site/kenko-2027-0729/assets
          cp index.html styles.css app.js _site/kenko-2027-0729/
          cp assets/favicon.png _site/kenko-2027-0729/assets/
          cp assets/mailmag-image-201.png _site/kenko-2027-0729/assets/
          cp assets/mailmag-image-204.jpg _site/kenko-2027-0729/assets/
          cp assets/mailmag-image-225.png _site/kenko-2027-0729/assets/
          cp assets/seminar-icon-requirements-imagegen2.png _site/kenko-2027-0729/assets/
          cp assets/seminar-icon-application-imagegen2.png _site/kenko-2027-0729/assets/
          cp assets/seminar-icon-improvement-imagegen2.png _site/kenko-2027-0729/assets/

          mkdir -p _site/mediphone-healthcheck
          cp mediphone-healthcheck/index.html _site/mediphone-healthcheck/

      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd _site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy static site"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
